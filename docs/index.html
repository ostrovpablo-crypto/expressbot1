<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Express Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow bg-glow--a"></div>
  <div class="bg-glow bg-glow--b"></div>
  <div class="bg-grid"></div>

  <div class="app">

    <header class="brand">
      <span class="brand__dot"></span>
      <span class="brand__name">EXPRESS BOT</span>
    </header>

    <main id="screen-picker" class="screen">
      <h1 class="title">Собери экспресс</h1>
      <p class="subtitle">Выбери целевой коэффициент — подберём реальные события под него</p>

      <div class="odds-grid" id="odds-grid">
        <button class="odds-btn" data-odds="1.5"><span>x1.5</span></button>
        <button class="odds-btn" data-odds="2"><span>x2</span></button>
        <button class="odds-btn" data-odds="3"><span>x3</span></button>
        <button class="odds-btn" data-odds="5"><span>x5</span></button>
        <button class="odds-btn" data-odds="10"><span>x10</span></button>
        <button class="odds-btn odds-btn--custom" id="custom-btn"><span>Свой</span></button>
      </div>

      <div class="custom-input" id="custom-input" hidden>
        <input type="number" step="0.1" min="1.01" id="custom-value" placeholder="Например 2.4" inputmode="decimal">
        <button class="primary-btn" id="custom-submit"><span>Собрать</span></button>
      </div>

      <div class="account-line" id="account-line"></div>
    </main>

    <main id="screen-loading" class="screen" hidden>
      <div class="spinner"><div class="spinner__ring"></div></div>
      <p class="loading-text">Собираю пресс, пока вам мацают шляпу на яхте...</p>
    </main>

    <main id="screen-result" class="screen" hidden>
      <div class="result-header">
        <span class="result-count" id="result-count"></span>
        <span class="result-total" id="result-total"></span>
      </div>

      <div class="legs" id="legs"></div>

      <p class="disclaimer">
        Математическая комбинация реальных коэффициентов. Не прогноз и не гарантия исхода.
      </p>

      <button class="primary-btn" id="new-express-btn"><span>Новый экспресс</span></button>
    </main>

    <main id="screen-error" class="screen" hidden>
      <p class="error-text" id="error-text"></p>
      <button class="primary-btn" id="error-retry-btn"><span>Попробовать снова</span></button>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
